# Basic settings
SEED: 42

# Data paths
DATA_PATHS:
  cpaisd: "dataset_APIS/dataset"
  cpaisd_enhanced: "dataset_APIS/dataset"
  brats: "Dataset_BraTs"
  rsna: "datasets/RSNA"

BASE_PATH: "./data"
IMAGE_DIR: "./data/images"
MASK_DIR: "./data/masks"
OUTPUT_DIR: "./outputs"
CHECKPOINT_DIR: "./checkpoints"

# Data split
TRAIN_SPLIT: 0.8

# Model parameters
NUM_CHANNELS: 1
NUM_CLASSES: 3
INIT_FEATURES: 32
IMAGE_SIZE: [512, 512]

# HU Windowing (Brain Stroke Optimized)
USE_HU_WINDOW: true
WINDOW_CENTER: 40
WINDOW_WIDTH: 40

# Dataset filtering for class balance
SKIP_EMPTY_SLICES: true
NEGATIVE_SAMPLE_RATIO: 0.05

# Loss Weights
FP_PENALTY_WEIGHT: 0.3

# Training
BATCH_SIZE: 20
NUM_EPOCHS: 150
LEARNING_RATE: 1.0e-4

# DataLoader parameters
NUM_WORKERS: 8
CACHE_RATE: 0.0
PIN_MEMORY: true
PERSISTENT_WORKERS: true

# Model architecture
T: 1
NUM_PARTITIONS_H: 4
NUM_PARTITIONS_W: 4
GLOBAL_IMPACT: 0.3
LOCAL_IMPACT: 0.7

# Transformer Parameters
TRANSFORMER_NUM_HEADS: 4
TRANSFORMER_NUM_LAYERS: 2
TRANSFORMER_EMBED_DIM: 1024

# Normalization
MEAN: null
STD: null

WEIGHT_DECAY: 1.0e-4

# Training stability
GRAD_CLIP_NORM: 1.0
USE_AMP: false
DEBUG_MODE: false
DETECT_ANOMALY: false

# ⭐ SOTA Components
USE_MAMBA: true
USE_KAN: true
USE_CONDITIONING: true

# Component-specific settings
MAMBA_DEPTH: 4
KAN_DEGREE: 3

# SymFormer specific
KMAX_NUM_HEADS: 8
KMAX_NUM_LAYERS: 2
SYMMETRY_WEIGHT: 0.05
CLUSTER_WEIGHT: 0.1

# Loss weights
DICE_WEIGHT: 0.7
CE_WEIGHT: 0.3
FOCAL_WEIGHT: 1.0
ALIGNMENT_WEIGHT: 0.05
PERCEPTUAL_WEIGHT: 0.1

# W&B settings
USE_WANDB: true
WANDB_PROJECT: "OmniSym-dataset-"
WANDB_ENTITY: null
WANDB_MODE: "online"

# Scheduler parameters
SCHEDULER_T0: 10
SCHEDULER_T_MULT: 2
SCHEDULER_ETA_MIN: 1.0e-6

# Early stopping
EARLY_STOPPING_PATIENCE: 30
